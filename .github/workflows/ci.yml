# Matrix: standard (Ubuntu + Windows + macOS, Release only, no benchmarks, no TSan)
# See .paul/phases/04-infra-docs/04-02-PLAN.md AC-4
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux build tools
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build

      - name: Install macOS build tools
        if: matrix.os == 'macos-latest'
        run: brew install ninja

      - name: Install Conan
        run: pip install "conan>=2.0,<3"

      - name: Detect Conan profile
        run: conan profile detect --force

      # Force Ninja Multi-Config on Linux/macOS so the canonical
      # `conan-default` preset (as documented in CLAUDE.md) exists on all cells.
      # Windows MSVC is already multi-config via the VS generator.
      - name: Conan install (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: conan install . --build=missing -s build_type=Release -c "tools.cmake.cmaketoolchain:generator=Ninja Multi-Config"

      - name: Conan install (Windows)
        if: matrix.os == 'windows-latest'
        run: conan install . --build=missing -s build_type=Release

      - name: CMake configure
        run: cmake --preset conan-default -DBUILD_TESTS=ON

      - name: CMake build (Release)
        run: cmake --build --preset conan-release

      - name: Run tests (Release)
        run: ctest --preset conan-release --output-on-failure
